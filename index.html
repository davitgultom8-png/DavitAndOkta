<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Graduation Oktavia</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    #overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background-color: #ffb6c1;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      flex-direction: column;
      text-align: center;
      color: white;
      font-family: sans-serif;
    }

    .btn-buka {
      padding: 15px 35px;
      margin-top: 20px;
      background: white;
      color: #ff69b4;
      border-radius: 50px;
      font-weight: bold;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    body {
      background-image: url("anime-love-bg.jpg"); 
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      font-family: 'Georgia', serif;
      height: 100vh;
      overflow: hidden; 
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .bg-filter {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255, 255, 255, 0.4);
      z-index: -1;
    }

    .content {
      display: none;
      width: 100%;
      height: 100%;
      position: relative;
    }

    .gallery {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 85%;
      max-width: 450px;
      height: 450px;
    }

    .gallery img {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border: 10px solid white;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      opacity: 0;
      animation: slideShow 12s forwards; /* Durasi tiap foto diperlama agar sinkron lagu */
    }

    #container-pesan {
      display: none; 
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90%;
      max-width: 550px;
      background: rgba(255, 255, 255, 0.95);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 15px 50px rgba(0,0,0,0.15);
      text-align: center;
      color: #d63384;
      border-top: 5px solid #ff69b4;
    }

    .footer-text {
      font-size: 1.1rem;
      line-height: 1.8;
      margin-bottom: 20px;
    }

    /* Animasi Slide Show (17 foto x 12 detik = 204 detik total) */
    @keyframes slideShow {
      0% { opacity: 0; transform: scale(0.9); }
      10% { opacity: 1; transform: scale(1); }
      90% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.9); }
    }

    /* Delay sinkronisasi agar pas dengan lagu Titi DJ yang panjang */
    img:nth-child(1) { animation-delay: 0s; }
    img:nth-child(2) { animation-delay: 12s; }
    img:nth-child(3) { animation-delay: 24s; }
    img:nth-child(4) { animation-delay: 36s; }
    img:nth-child(5) { animation-delay: 48s; }
    img:nth-child(6) { animation-delay: 60s; }
    img:nth-child(7) { animation-delay: 72s; }
    img:nth-child(8) { animation-delay: 84s; }
    img:nth-child(9) { animation-delay: 96s; }
    img:nth-child(10) { animation-delay: 108s; }
    img:nth-child(11) { animation-delay: 120s; }
    img:nth-child(12) { animation-delay: 132s; }
    img:nth-child(13) { animation-delay: 144s; }
    img:nth-child(14) { animation-delay: 156s; }
    img:nth-child(15) { animation-delay: 168s; }
    img:nth-child(16) { animation-delay: 180s; }
    img:nth-child(17) { animation-delay: 192s; }

  </style>
</head>
<body>

  <div id="overlay" onclick="mulai()">
    <h2>Hallo Sayang, Ada Pesan Untukmu ❤️</h2>
    <button class="btn-buka">BUKA SEKARANG</button>
  </div>

  <div class="bg-filter"></div>

  <div class="content" id="mainContent">
    <div class="gallery" id="galeriFoto">
      <img src="foto1.jpeg" alt="1">
      <img src="foto2.jpeg" alt="2">
      <img src="foto3.jpeg" alt="3">
      <img src="foto4.jpeg" alt="4">
      <img src="foto5.jpeg" alt="5">
      <img src="foto6.jpeg" alt="6">
      <img src="foto7.jpeg" alt="7">
      <img src="foto8.jpeg" alt="8">
      <img src="foto9.jpeg" alt="9">
      <img src="foto10.jpeg" alt="10">
      <img src="foto11.jpeg" alt="11">
      <img src="foto12.jpeg" alt="12">
      <img src="foto13.jpeg" alt="13">
      <img src="foto14.jpeg" alt="14">
      <img src="foto15.jpeg" alt="15">
      <img src="foto16.jpeg" alt="16">
      <img src="foto17.jpeg" alt="17">
    </div>

    <div id="container-pesan">
      <p class="footer-text" id="typed-text"></p>
      <p style="font-weight:bold">💖 Jangan berhenti mencintaiku 💖</p>
    </div>
  </div>

  <audio id="myLagu">
    <source src="TitiDj-JanganBerhentiMencintaiku.mp3" type="audio/mpeg">
  </audio>

  <script>
    const pesanBaru = "Selamat wisuda sayang ku cintaku aku terharu melihatmu sampai di titik ini semua perjuanganmu akhirnya terbayarkan Oktavia hebat Oktavia kuat dan Oktavia luar biasa Terima kasih sudah tidak pernah menyerah aku bangga punya Oktavia sidauruk ini semoga langkahmu ke depan selalu diberkati dan aku berharap bisa terus menemanimu dalam setiap perjalanan hidupmu.";

    function typeWriter(text, i, fnCallback) {
      if (i < text.length) {
        document.getElementById("typed-text").innerHTML = text.substring(0, i+1);
        setTimeout(function() {
          typeWriter(text, i + 1, fnCallback)
        }, 100);
      } else {
        // Durasi total lagu sekitar 270 detik (4:30). 
        // Foto habis di detik ke-204 + ngetik pesan. 
        // Sisa waktu akan digunakan untuk memajang pesan sebelum close.
        setTimeout(fnCallback, 15000); 
      }
    }

    function mulai() {
      document.getElementById("overlay").style.display = "none";
      document.getElementById("mainContent").style.display = "block";
      const lagu = document.getElementById("myLagu");
      lagu.play();

      // Foto selesai di detik 204, lalu ganti ke teks
      setTimeout(function() {
        document.getElementById("galeriFoto").style.display = "none";
        document.getElementById("container-pesan").style.display = "block";
        
        typeWriter(pesanBaru, 0, function() {
          // Otomatis pindah halaman saat lagu habis
          window.location.href = "https://www.google.com";
        });
      }, 204000); 

      // Keamanan cadangan: Paksa tutup/pindah jika lagu mencapai 270 detik
      setTimeout(function() {
         window.location.href = "https://www.google.com";
      }, 270000);
    }
  </script>
</body>
</html>
