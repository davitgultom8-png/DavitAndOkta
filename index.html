<script>
const pesan = "Selamat wisuda sayang ku cintaku aku terharu melihatmu sampai di titik ini semua perjuanganmu akhirnya terbayarkan Oktavia hebat Oktavia kuat dan Oktavia luar biasa Terima kasih sudah tidak pernah menyerah aku bangga punya Oktavia sidauruk ini semoga langkahmu ke depan selalu diberkati dan aku berharap bisa terus menemanimu dalam setiap perjalanan hidupmu.";

function typeWriter(text, i) {
  if (i < text.length) {
    document.getElementById("typed-text").innerHTML =
      text.substring(0, i+1);

    setTimeout(() => {
      typeWriter(text, i+1);
    }, 50);

  } else {
    // ✅ JIKA SUDAH SELESAI MENGETIK
    setTimeout(() => {
      document.body.innerHTML =
        "<h2 style='text-align:center;margin-top:50%;color:#d63384;'>Terima kasih sudah membaca ❤️</h2>";
    }, 4000); // jeda 4 detik setelah selesai
  }
}

function mulai() {
  let overlay = document.getElementById("overlay");

  // fade out
  overlay.classList.add("fade-out");

  setTimeout(() => {
    overlay.style.display = "none";
    document.getElementById("mainContent").style.display = "block";

    let lagu = document.getElementById("myLagu");
    lagu.play();

    // mulai typing setelah slideshow
    setTimeout(() => {
      typeWriter(pesan, 0);
    }, 120000);

  }, 1500);
}
</script>
