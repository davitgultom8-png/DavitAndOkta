<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Graduation Oktavia Sidauruk</title>
  <style>
    /* RESET DASAR */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-image: url("anime-love-bg.jpg"); 
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #fce4ec;
    }

    /* FILTER AGAR BG TIDAK TERLALU TERANG */
    .bg-filter {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.2);
      z-index: -1;
    }

    /* TOMBOL START */
    #overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: #ffb6c1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      text-align: center;
      color: white;
    }

    .btn-buka {
      padding: 15px 30px;
      margin-top: 20px;
      background: white;
      color: #d81b60;
      border: none;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
      font-size: 1.1rem;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    /* CONTAINER UTAMA */
    #mainContent {
      display: none;
      width: 100%;
      height: 100%;
      position: relative;
    }

    /* UKURAN FOTO: DIKUNCI AGAR RAPI (TIDAK BESAR) */
    .photo-frame {
      position: absolute;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 250px; /* Lebar kecil yang elegan */
      height: auto;
      min-height: 350px;
      background: white;
      padding: 10px;
      border-radius: 5px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .photo-frame img {
      width: 100%;
      height: 350px;
      object-fit: contain; /* FOTO DIJAMIN TIDAK TERPOTONG */
      opacity: 0;
      position: absolute;
      top: 10px;
      left: 10px;
      width: calc(100% - 20px);
      animation: fadeSlide 12s forwards;
    }

    /* KOTAK TEKS */
    #text-box {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 85%;
      max-width: 400px;
      background: rgba(255, 255, 255, 0.95);
      padding: 25px;
      border-radius: 15px;
      text-align: center;
      color: #c2185b;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      border: 2px solid #f8bbd0;
    }

    .typing {
      font-size: 1rem;
      line-height: 1.6;
      font-style: italic;
    }

    /* ANIMASI */
    @keyframes fadeSlide {
      0% { opacity: 0; transform: scale(0.9); }
      10% { opacity: 1; transform: scale(1); }
      90% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.9); }
    }

    /* DELAY FOTO 1 - 17 */
    img:nth-child(1) { animation-delay: 0s; }
    img:nth-child(2) { animation-delay: 12s; }
    img:nth-child(3) { animation-delay: 24s; }
    img:nth-child(4) { animation-delay: 36s; }
    img:nth-child(5) { animation-delay: 48s; }
    img:nth-child(6) { animation-delay: 60s; }
    img:nth-child(7) { animation-delay: 72s; }
    img:nth-child(8) { animation-delay: 84s; }
    img:nth-child(9) { animation-delay: 96s; }
    img:nth-child(10) { animation-delay: 108s; }
    img:nth-child(11) { animation-delay: 120s; }
    img:nth-child(12) { animation-delay: 132s; }
    img:nth-child(13) { animation-delay: 144s; }
    img:nth-child(14) { animation-delay: 156s; }
    img:nth-child(15) { animation-delay: 168s; }
    img:nth-child(16) { animation-delay: 180s; }
    img:nth-child(17) { animation-delay: 192s; }

  </style>
</head>
<body>

  <div id="overlay">
    <h2>Special for Oktavia Sidauruk ❤️</h2>
    <button class="btn-buka" onclick="startApp()">Klik untuk Memulai</button>
  </div>

  <div class="bg-filter"></div>

  <div id="mainContent">
    <div class="photo-frame" id="frame">
      <img src="foto1.jpeg">
      <img src="foto2.jpeg">
      <img src="foto3.jpeg">
      <img src="foto4.jpeg">
      <img src="foto5.jpeg">
      <img src="foto6.jpeg">
      <img src="foto7.jpeg">
      <img src="foto8.jpeg">
      <img src="foto9.jpeg">
      <img src="foto10.jpeg">
      <img src="foto11.jpeg">
      <img src="foto12.jpeg">
      <img src="foto13.jpeg">
      <img src="foto14.jpeg">
      <img src="foto15.jpeg">
      <img src="foto16.jpeg">
      <img src="foto17.jpeg">
    </div>

    <div id="text-box">
      <p class="typing" id="typed"></p>
      <p style="margin-top:20px; font-weight:bold;">💖 Teruslah Bersinar 💖</p>
    </div>
  </div>

  <audio id="lagu" src="TitiDj-JanganBerhentiMencintaiku.mp3"></audio>

  <script>
    const pesan = "“Selamat wisuda sayang ku cintaku aku terharu melihatmu sampai di titik ini semua perjuanganmu akhirnya terbayarkan Oktavia hebat Oktavia kuat dan Oktavia luar biasa Terima kasih sudah tidak pernah menyerah aku bangga punya Oktavia sidauruk ini semoga langkahmu ke depan selalu diberkati dan aku berharap bisa terus menemanimu dalam setiap perjalanan hidupmu.”";

    function startApp() {
      document.getElementById("overlay").style.display = "none";
      document.getElementById("mainContent").style.display = "block";
      const audio = document.getElementById("lagu");
      audio.play();

      // Durasi total slideshow foto (17 foto x 12 detik = 204 detik)
      setTimeout(() => {
        document.getElementById("frame").style.display = "none";
        document.getElementById("text-box").style.display = "block";
        startTyping();
      }, 204000); 
    }

    function startTyping() {
      let i = 0;
      const speed = 100;
      const target = document.getElementById("typed");

      function type() {
        if (i < pesan.length) {
          target.innerHTML += pesan.charAt(i);
          i++;
          setTimeout(type, speed);
        } else {
          // Tunggu 10 detik setelah teks selesai diketik, lalu auto close
          setTimeout(autoClose, 10000);
        }
      }
      type();
    }

    function autoClose() {
      // Mengalihkan ke Google sebagai pengganti window.close() yang diblokir browser modern
      window.location.href = "https://www.google.com";
    }

    // Safety timer: Tutup paksa di menit ke 4.5 (durasi lagu)
    setTimeout(autoClose, 270000);
  </script>
</body>
</html>
