<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Graduation Oktavia Sidauruk</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            /* Pastikan file anime-love-bg.jpg ada di folder yang sama */
            background-image: url("anime-love-bg.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: 'Arial', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* LAYAR AWAL TRANSPARAN AGAR BACKGROUND TERLIHAT */
        #layar-awal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.3); /* Hitam transparan agar gambar anime terlihat jelas */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: white;
            text-align: center;
            backdrop-filter: blur(2px);
        }

        .tombol {
            padding: 15px 40px;
            margin-top: 25px;
            background: #ff69b4;
            color: white;
            border: 2px solid white;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            font-size: 1.1rem;
            text-transform: uppercase;
        }

        /* FRAME POLAROID PUTIH (LEBIH BESAR & RAPI) */
        .wrapper {
            display: none;
            width: 85%; 
            max-width: 320px;
            background: white; 
            padding: 15px 15px 60px 15px;
            border-radius: 8px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            text-align: center;
            position: relative;
        }

        .wrapper img {
            width: 100%;
            height: 400px; /* Tinggi ditambah agar foto lebih puas dilihat */
            object-fit: cover;
            display: none;
            border-radius: 4px;
        }

        /* TEKS DI BAWAH FOTO */
        .caption-foto {
            position: absolute;
            bottom: 20px;
            width: 100%;
            left: 0;
            color: #d63384;
            font-size: 1rem;
            font-weight: bold;
        }

        /* KOTAK PESAN */
        #kotak-pesan {
            display: none;
            width: 85%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.95); 
            padding: 30px 20px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            border: 2px solid #ffb6c1;
        }

        #teks-jalan {
            color: #d63384;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .fade { animation: fadeEffect 1s ease; }
        @keyframes fadeEffect { from {opacity: 0;} to {opacity: 1;} }
    </style>
</head>
<body>

    <div id="layar-awal">
        <h2 style="text-shadow: 2px 2px 5px rgba(0,0,0,0.5);">Special Gift for<br>Oktavia Sidauruk ❤️</h2>
        <button class="tombol" onclick="mulai()">Klik Disini</button>
    </div>

    <div class="wrapper" id="frame">
        <img src="foto1.jpeg" class="slide">
        <img src="foto2.jpeg" class="slide">
        <img src="foto3.jpeg" class="slide">
        <img src="foto4.jpeg" class="slide">
        <img src="foto5.jpeg" class="slide">
        <img src="foto6.jpeg" class="slide">
        <img src="foto7.jpeg" class="slide">
        <img src="foto8.jpeg" class="slide">
        <img src="foto9.jpeg" class="slide">
        <img src="foto10.jpeg" class="slide">
        <img src="foto11.jpeg" class="slide">
        <img src="foto12.jpeg" class="slide">
        <img src="foto13.jpeg" class="slide">
        <img src="foto14.jpeg" class="slide">
        <img src="foto15.jpeg" class="slide">
        <img src="foto16.jpeg" class="slide">
        <img src="foto17.jpeg" class="slide">
        <p class="caption-foto">Happy Graduation Sayang ❤️</p>
    </div>

    <div id="kotak-pesan">
        <p id="teks-jalan"></p>
        <p style="margin-top:25px; font-weight:bold; color:#ff69b4; font-size: 1.3rem;">Love You 💖</p>
    </div>

    <audio id="musik" src="TitiDj-JanganBerhentiMencintaiku.mp3"></audio>

    <script>
        const pesanCinta = "“Selamat wisuda sayang ku cintaku aku terharu melihatmu sampai di titik ini semua perjuanganmu akhirnya terbayarkan Oktavia hebat Oktavia kuat dan Oktavia luar biasa Terima kasih sudah tidak pernah menyerah aku bangga punya Oktavia sidauruk ini semoga langkahmu ke depan selalu diberkati dan aku berharap bisa terus menemanimu dalam setiap perjalanan hidupmu.”";
        let n = 0;
        const slides = document.querySelectorAll(".slide");

        function mulai() {
            document.getElementById("layar-awal").style.display = "none";
            document.getElementById("frame").style.display = "block";
            document.getElementById("musik").play();
            tampilFoto();
        }

        function tampilFoto() {
            if (n < slides.length) {
                slides.forEach(s => s.style.display = "none");
                slides[n].style.display = "block";
                slides[n].classList.add("fade");
                n++;
                setTimeout(tampilFoto, 8000); // 8 detik per foto agar durasi pas dengan lagu
            } else {
                document.getElementById("frame").style.display = "none";
                document.getElementById("kotak-pesan").style.display = "block";
                mulaiMengetik();
            }
        }

        function mulaiMengetik() {
            let i = 0;
            const target = document.getElementById("teks-jalan");
            function ketik() {
                if (i < pesanCinta.length) {
                    target.innerHTML += pesanCinta.charAt(i);
                    i++;
                    setTimeout(ketik, 70);
                } else {
                    setTimeout(tutupOtomatis, 15000);
                }
            }
            ketik();
        }

        function tutupOtomatis() {
            window.location.href = "https://www.google.com";
        }
    </script>
</body>
</html>
