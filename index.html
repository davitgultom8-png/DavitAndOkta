<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Graduation Oktavia Sidauruk</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-image: url("anime-love-bg.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: 'Arial', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #layar-awal {
            position: fixed;
            inset: 0;
            background: rgba(255, 182, 193, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: white;
            text-align: center;
        }

        .tombol {
            padding: 12px 35px;
            margin-top: 20px;
            background: white;
            color: #ff69b4;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .wrapper {
            display: none;
            width: 80%; 
            max-width: 280px;
            background: rgba(255, 255, 255, 0.85); 
            padding: 10px 10px 35px 10px;
            border-radius: 8px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            text-align: center;
            backdrop-filter: blur(5px);
        }

        .wrapper img {
            width: 100%;
            height: auto;
            max-height: 350px;
            object-fit: contain;
            display: none;
            border-radius: 4px;
        }

        #kotak-pesan {
            display: none;
            width: 85%;
            max-width: 380px;
            background: rgba(255, 255, 255, 0.9); 
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            backdrop-filter: blur(5px);
        }

        #teks-jalan {
            color: #d63384;
            font-size: 1rem;
            line-height: 1.5;
        }

        .fade { animation: fadeEffect 0.8s; }
        @keyframes fadeEffect { from {opacity: 0;} to {opacity: 1;} }
    </style>
</head>
<body>

    <div id="layar-awal">
        <h2 style="padding: 0 20px;">Klik untuk Oktavia Sidauruk ❤️</h2>
        <button class="tombol" onclick="mulai()">BUKA</button>
    </div>

    <div class="wrapper" id="frame">
        <img src="foto1.jpeg" class="slide">
        <img src="foto2.jpeg" class="slide">
        <img src="foto3.jpeg" class="slide">
        <img src="foto4.jpeg" class="slide">
        <img src="foto5.jpeg" class="slide">
        <img src="foto6.jpeg" class="slide">
        <img src="foto7.jpeg" class="slide">
        <img src="foto8.jpeg" class="slide">
        <img src="foto9.jpeg" class="slide">
        <img src="foto10.jpeg" class="slide">
        <img src="foto11.jpeg" class="slide">
        <img src="foto12.jpeg" class="slide">
        <img src="foto13.jpeg" class="slide">
        <img src="foto14.jpeg" class="slide">
        <img src="foto15.jpeg" class="slide">
        <img src="foto16.jpeg" class="slide">
        <img src="foto17.jpeg" class="slide">
        <!-- TEKS DI BAWAH FOTO SUDAH DIPERBAIKI -->
        <p style="margin-top:15px; color: #ff69b4; font-size: 0.9rem; font-weight: bold;">Happy Graduation Sayang ❤️</p>
    </div>

    <div id="kotak-pesan">
        <p id="teks-jalan"></p>
        <!-- TEKS DI BAWAH PESAN JALAN SUDAH DIPERBAIKI -->
        <p style="margin-top:20px; font-weight:bold; color:#ff69b4;">Love You 💖</p>
    </div>

    <audio id="musik" src="TitiDj-JanganBerhentiMencintaiku.mp3"></audio>

    <script>
        const pesan = "“Selamat wisuda sayang ku cintaku aku terharu melihatmu sampai di titik ini semua perjuanganmu akhirnya terbayarkan Oktavia hebat Oktavia kuat dan Oktavia luar biasa Terima kasih sudah tidak pernah menyerah aku bangga punya Oktavia sidauruk ini semoga langkahmu ke depan selalu diberkati dan aku berharap bisa terus menemanimu dalam setiap perjalanan hidupmu.”";
        let n = 0;
        const slides = document.querySelectorAll(".slide");

        function mulai() {
            document.getElementById("layar-awal").style.display = "none";
            document.getElementById("frame").style.display = "block";
            document.getElementById("musik").play();
            tampilFoto();
        }

        function tampilFoto() {
            if (n < slides.length) {
                slides.forEach(s => s.style.display = "none");
                slides[n].style.display = "block";
                slides[n].classList.add("fade");
                n++;
                setTimeout(tampilFoto, 10000); 
            } else {
                document.getElementById("frame").style.display = "none";
                document.getElementById("kotak-pesan").style.display = "block";
                ketik();
            }
        }

        let i = 0;
        function ketik() {
            if (i < pesan.length) {
                document.getElementById("teks-jalan").innerHTML += pesan.charAt(i);
                i++;
                setTimeout(ketik, 80);
            } else {
                setTimeout(tutup, 15000);
            }
        }

        function tutup() {
            window.location.href = "https://www.google.com";
        }

        setTimeout(tutup, 270000);
    </script>
</body>
</html>
