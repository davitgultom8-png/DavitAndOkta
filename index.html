<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Graduation Sayang</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* LAYAR PEMBUKA (Agar musik bisa otomatis setelah klik) */
    #overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background-color: #ffb6c1;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
      cursor: pointer;
      flex-direction: column;
      text-align: center;
      color: white;
      font-family: Arial, sans-serif;
    }

    #overlay h2 { margin-bottom: 20px; font-size: 24px; }
    
    .btn-buka {
      padding: 15px 30px;
      background: white;
      color: #ff69b4;
      border-radius: 50px;
      font-weight: bold;
      border: none;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    /* BACKGROUND UTAMA */
    body {
      background-image: url("anime-love-bg.jpg"); /* Memanggil file background kamu */
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      font-family: 'Arial', sans-serif;
      text-align: center;
      overflow: hidden;
      height: 100vh;
    }

    /* Filter agar background tidak terlalu terang */
    .bg-filter {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255, 255, 255, 0.3);
      z-index: -1;
    }

    .content {
      display: none; /* Sembunyi sampai tombol diklik */
      padding-top: 50px;
    }

    h1 {
      color: #d63384;
      text-shadow: 2px 2px 5px white;
      animation: fadeIn 2s ease-in;
    }

    .gallery {
      position: relative;
      margin-top: 40px;
      height: 450px;
    }

    .gallery img {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      max-width: 85%;
      max-height: 400px;
      border: 8px solid white;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      opacity: 0;
      animation: slideShow 8s forwards;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    @keyframes slideShow {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.7); }
      15% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      85% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(0.7); }
    }

    /* Delay Animasi Foto */
    img:nth-child(1) { animation-delay: 1s; }
    img:nth-child(2) { animation-delay: 9s; }
    img:nth-child(3) { animation-delay: 17s; }
    img:nth-child(4) { animation-delay: 25s; }
    img:nth-child(5) { animation-delay: 33s; }
    img:nth-child(6) { animation-delay: 41s; }
    img:nth-child(7) { animation-delay: 49s; }
    img:nth-child(8) { animation-delay: 57s; }
    img:nth-child(9) { animation-delay: 65s; }
    img:nth-child(10) { animation-delay: 73s; }
    img:nth-child(11) { animation-delay: 81s; }
    img:nth-child(12) { animation-delay: 89s; }
    img:nth-child(13) { animation-delay: 97s; }
    img:nth-child(14) { animation-delay: 105s; }
    img:nth-child(15) { animation-delay: 113s; }
    img:nth-child(16) { animation-delay: 121s; }
    img:nth-child(17) { animation-delay: 129s; }

    h2.footer-text {
      color: #d63384;
      margin-top: 20px;
      opacity: 0;
      animation: fadeIn 3s forwards;
      animation-delay: 137s;
    }
  </style>
</head>
<body>

  <!-- Layar Pembuka -->
  <div id="overlay" onclick="mulai()">
    <h2>Klik untuk Buka Pesan ❤️</h2>
    <button class="btn-buka">BUKA SEKARANG</button>
  </div>

  <div class="bg-filter"></div>

  <div class="content" id="mainContent">
    <h1>💖 Happy Graduation Sayang 💖</h1>
    
    <div class="gallery">
      <img src="foto1.jpeg" alt="1">
      <img src="foto2.jpeg" alt="2">
      <img src="foto3.jpeg" alt="3">
      <img src="foto4.jpeg" alt="4">
      <img src="foto5.jpeg" alt="5">
      <img src="foto6.jpeg" alt="6">
      <img src="foto7.jpeg" alt="7">
      <img src="foto8.jpeg" alt="8">
      <img src="foto9.jpeg" alt="9">
      <img src="foto10.jpeg" alt="10">
      <img src="foto11.jpeg" alt="11">
      <img src="foto12.jpeg" alt="12">
      <img src="foto13.jpeg" alt="13">
      <img src="foto14.jpeg" alt="14">
      <img src="foto15.jpeg" alt="15">
      <img src="foto16.jpeg" alt="16">
      <img src="foto17.jpeg" alt="17">
    </div>

    <h2 class="footer-text">💖 Jangan berhenti mencintaiku 💖</h2>
  </div>

  <!-- Musik -->
  <audio id="myLagu" loop>
    <source src="TitiDj-JanganBerhentiMencintaiku.mp3" type="audio/mpeg">
  </audio>

  <script>
    function mulai() {
      // 1. Sembunyikan Overlay
      document.getElementById("overlay").style.display = "none";
      
      // 2. Tampilkan Konten
      document.getElementById("mainContent").style.display = "block";
      
      // 3. Putar Musik (Berhasil karena sudah ada klik)
      var lagu = document.getElementById("myLagu");
      lagu.play();
    }
  </script>

</body>
</html>
