<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Galeri Wisuda & Musik</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px;
      /* Menggunakan file yang kamu maksud sebagai background utama */
      background: url("anime-love-bg.jpg") no-repeat center center fixed;
      background-size: cover;
      color: #333;
      overflow-x: hidden;
    }

    /* Overlay putih transparan agar teks tetap terbaca jelas */
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255, 255, 255, 0.3); 
      z-index: -1;
    }

    h1, h2 {
      text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.8);
      color: #d63384;
      opacity: 0;
      position: relative;
      z-index: 2;
    }

    @keyframes fadeText {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeTextOut {
      0% { opacity: 0; transform: translateY(20px); }
      30% { opacity: 1; transform: translateY(0); }
      70% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(20px); }
    }

    .gallery {
      position: relative;
      width: 100%;
      height: 500px;
      margin-top: 30px;
    }

    img {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      max-width: 85%;
      max-height: 420px;
      border: 8px solid #fff;
      border-radius: 15px;
      opacity: 0;
      animation: showHide 8s forwards;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      object-fit: cover;
    }

    @keyframes showHide {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
      15% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      85% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
    }

    h1 {
      animation: fadeText 3s forwards;
      animation-delay: 0.5s;
    }

    /* Delay untuk setiap foto */
    img:nth-child(1) { animation-delay: 4s; }
    img:nth-child(2) { animation-delay: 12s; }
    img:nth-child(3) { animation-delay: 20s; }
    img:nth-child(4) { animation-delay: 28s; }
    img:nth-child(5) { animation-delay: 36s; }
    img:nth-child(6) { animation-delay: 44s; }
    img:nth-child(7) { animation-delay: 52s; }
    img:nth-child(8) { animation-delay: 60s; }
    img:nth-child(9) { animation-delay: 68s; }
    img:nth-child(10) { animation-delay: 76s; }
    img:nth-child(11) { animation-delay: 84s; }
    img:nth-child(12) { animation-delay: 92s; }
    img:nth-child(13) { animation-delay: 100s; }
    img:nth-child(14) { animation-delay: 108s; }
    img:nth-child(15) { animation-delay: 116s; }
    img:nth-child(16) { animation-delay: 124s; }
    img:nth-child(17) { animation-delay: 132s; }

    h2 {
      animation: fadeTextOut 10s forwards;
      animation-delay: 140s;
    }

    .music-control {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(255, 255, 255, 0.8);
      color: #d63384;
      padding: 10px 20px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: bold;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      cursor: pointer;
      z-index: 100;
    }
  </style>
</head>
<body>

  <h1>💖 Happy Graduation Sayang 💖</h1>

  <div class="gallery">
    <!-- Pastikan file-file ini ada di folder yang sama -->
    <img src="foto1.jpeg" alt="Foto 1">
    <img src="foto2.jpeg" alt="Foto 2">
    <img src="foto3.jpeg" alt="Foto 3">
    <img src="foto4.jpeg" alt="Foto 4">
    <img src="foto5.jpeg" alt="Foto 5">
    <img src="foto6.jpeg" alt="Foto 6">
    <img src="foto7.jpeg" alt="Foto 7">
    <img src="foto8.jpeg" alt="Foto 8">
    <img src="foto9.jpeg" alt="Foto 9">
    <img src="foto10.jpeg" alt="Foto 10">
    <img src="foto11.jpeg" alt="Foto 11">
    <img src="foto12.jpeg" alt="Foto 12">
    <img src="foto13.jpeg" alt="Foto 13">
    <img src="foto14.jpeg" alt="Foto 14">
    <img src="foto15.jpeg" alt="Foto 15">
    <img src="foto16.jpeg" alt="Foto 16">
    <img src="foto17.jpeg" alt="Foto 17">
  </div>

  <h2>💖 Jangan berhenti mencintaiku dan jangan berubah sampai kapanpun 💖</h2>

  <audio id="mySong" loop>
    <source src="TitiDj-JanganBerhentiMencintaiku.mp3" type="audio/mpeg">
  </audio>

  <div class="music-control" onclick="playMusic()">🎵 Klik di sini untuk Musik</div>

  <script>
    function playMusic() {
        var audio = document.getElementById('mySong');
        audio.play();
        document.querySelector('.music-control').innerHTML = "🎵 Musik Aktif";
    }

    // Klik di mana saja juga akan menjalankan musik
    document.body.addEventListener('click', playMusic, { once: true });

    // Penutup otomatis
    setTimeout(function() {
      window.close();
    }, 150000); 
  </script>
</body>
</html>
