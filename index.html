<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Galeri Wisuda & Musik</title>
  <style>
    /* Reset dasar */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      height: 100%;
      width: 100%;
      font-family: 'Arial', sans-serif;
    }

    /* Container utama untuk background */
    .main-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      /* MEMANGGIL FILE GAMBAR BACKGROUND */
      background-image: url("anime-love-bg.jpg"); 
      background-position: center;
      background-repeat: no-repeat;
      background-size: cover;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Overlay agar gambar tidak terlalu terang dan teks terbaca */
    .overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255, 255, 255, 0.4); /* Transparansi putih */
      z-index: 1;
    }

    .content {
      position: relative;
      z-index: 10;
      text-align: center;
      width: 100%;
    }

    h1 {
      color: #d63384;
      text-shadow: 2px 2px 5px rgba(255, 255, 255, 0.8);
      margin-bottom: 20px;
      animation: fadeText 3s forwards;
    }

    .gallery {
      position: relative;
      height: 450px;
      width: 100%;
    }

    img {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      max-width: 90%;
      max-height: 400px;
      border: 10px solid white;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      opacity: 0;
      animation: showHide 8s forwards;
    }

    /* Pengaturan Animasi */
    @keyframes fadeText {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes showHide {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.7); }
      15% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      85% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(0.7); }
    }

    /* Copy-paste delay dari kode lama */
    img:nth-child(1) { animation-delay: 2s; }
    img:nth-child(2) { animation-delay: 10s; }
    img:nth-child(3) { animation-delay: 18s; }
    img:nth-child(4) { animation-delay: 26s; }
    img:nth-child(5) { animation-delay: 34s; }
    img:nth-child(6) { animation-delay: 42s; }
    img:nth-child(7) { animation-delay: 50s; }
    img:nth-child(8) { animation-delay: 58s; }
    img:nth-child(9) { animation-delay: 66s; }
    img:nth-child(10) { animation-delay: 74s; }
    img:nth-child(11) { animation-delay: 82s; }
    img:nth-child(12) { animation-delay: 90s; }
    img:nth-child(13) { animation-delay: 98s; }
    img:nth-child(14) { animation-delay: 106s; }
    img:nth-child(15) { animation-delay: 114s; }
    img:nth-child(16) { animation-delay: 122s; }
    img:nth-child(17) { animation-delay: 130s; }

    .music-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 12px 25px;
      background: #ff69b4;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-weight: bold;
      z-index: 100;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>

  <div class="main-container">
    <div class="overlay"></div>
    
    <div class="content">
      <h1>💖 Happy Graduation Sayang 💖</h1>

      <div class="gallery">
        <img src="foto1.jpeg" alt="1">
        <img src="foto2.jpeg" alt="2">
        <img src="foto3.jpeg" alt="3">
        <img src="foto4.jpeg" alt="4">
        <img src="foto5.jpeg" alt="5">
        <img src="foto6.jpeg" alt="6">
        <img src="foto7.jpeg" alt="7">
        <img src="foto8.jpeg" alt="8">
        <img src="foto9.jpeg" alt="9">
        <img src="foto10.jpeg" alt="10">
        <img src="foto11.jpeg" alt="11">
        <img src="foto12.jpeg" alt="12">
        <img src="foto13.jpeg" alt="13">
        <img src="foto14.jpeg" alt="14">
        <img src="foto15.jpeg" alt="15">
        <img src="foto16.jpeg" alt="16">
        <img src="foto17.jpeg" alt="17">
      </div>
    </div>
  </div>

  <audio id="lagu" loop>
    <source src="TitiDj-JanganBerhentiMencintaiku.mp3" type="audio/mpeg">
  </audio>

  <button class="music-btn" onclick="putar()">🎵 Mulai Musik</button>

  <script>
    function putar() {
      var audio = document.getElementById("lagu");
      audio.play();
      document.querySelector(".music-btn").style.display = "none";
    }
  </script>

</body>
</html>
