<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Graduation Oktavia Sidauruk</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #ffe4e1;
            background-image: url("anime-love-bg.jpg");
            background-size: cover;
            background-position: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #layar-awal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #ffb6c1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: white;
            padding: 20px;
        }

        .tombol {
            padding: 15px 30px;
            margin-top: 20px;
            background: white;
            color: #ff69b4;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* FRAME FOTO YANG FLEKSIBEL & RAPI */
        .photo-container {
            display: none;
            position: relative;
            max-width: 90%; /* Supaya tidak luber di HP */
            max-height: 70vh; /* Supaya tidak kepotong bawahnya */
            background: white;
            padding: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border-radius: 8px;
            text-align: center;
        }

        .photo-container img {
            max-width: 100%;
            max-height: 60vh;
            display: none;
            border-radius: 4px;
            object-fit: contain;
        }

        /* KOTAK PESAN */
        #kotak-pesan {
            display: none;
            width: 85%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border: 2px solid #ffb6c1;
        }

        #teks-jalan {
            color: #d63384;
            font-size: 1.1rem;
            line-height: 1.6;
            font-style: italic;
            min-height: 100px;
        }

        .fade-in { animation: fadeIn 0.8s ease-in forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    </style>
</head>
<body>

    <div id="layar-awal">
        <h1 style="text-align:center;">Klik untuk Oktavia Sidauruk ❤️</h1>
        <button class="tombol" onclick="mulai()">BUKA SEKARANG</button>
    </div>

    <div class="photo-container" id="frame">
        <!-- Foto 1 sampai 17 -->
        <img src="foto1.jpeg" class="slides">
        <img src="foto2.jpeg" class="slides">
        <img src="foto3.jpeg" class="slides">
        <img src="foto4.jpeg" class="slides">
        <img src="foto5.jpeg" class="slides">
        <img src="foto6.jpeg" class="slides">
        <img src="foto7.jpeg" class="slides">
        <img src="foto8.jpeg" class="slides">
        <img src="foto9.jpeg" class="slides">
        <img src="foto10.jpeg" class="slides">
        <img src="foto11.jpeg" class="slides">
        <img src="foto12.jpeg" class="slides">
        <img src="foto13.jpeg" class="slides">
        <img src="foto14.jpeg" class="slides">
        <img src="foto15.jpeg" class="slides">
        <img src="foto16.jpeg" class="slides">
        <img src="foto17.jpeg" class="slides">
        
        <!-- Tulisan kecil di bawah foto -->
        <p style="margin-top: 10px; color: #ff69b4; font-size: 0.8rem;">Happy Graduation Sayang ❤️</p>
    </div>

    <div id="kotak-pesan">
        <p id="teks-jalan"></p>
        <p style="margin-top:20px; font-weight:bold; color:#ff69b4;">💖 Love You 💖</p>
    </div>

    <audio id="lagu" src="TitiDj-JanganBerhentiMencintaiku.mp3"></audio>

    <script>
        const kataKata = "“Selamat wisuda sayang ku cintaku aku terharu melihatmu sampai di titik ini semua perjuanganmu akhirnya terbayarkan Oktavia hebat Oktavia kuat dan Oktavia luar biasa Terima kasih sudah tidak pernah menyerah aku bangga punya Oktavia sidauruk ini semoga langkahmu ke depan selalu diberkati dan aku berharap bisa terus menemanimu dalam setiap perjalanan hidupmu.”";
        let currentIndex = 0;
        const slides = document.querySelectorAll(".slides");

        function mulai() {
            document.getElementById("layar-awal").style.display = "none";
            document.getElementById("frame").style.display = "block";
            document.getElementById("lagu").play();
            showSlides();
        }

        function showSlides() {
            if (currentIndex < slides.length) {
                // Reset semua slide
                slides.forEach(s => s.style.display = "none");
                
                // Tampilkan yang sekarang
                slides[currentIndex].style.display = "block";
                slides[currentIndex].classList.add("fade-in");
                
                currentIndex++;
                setTimeout(showSlides, 10000); // Ganti tiap 10 detik
            } else {
                // Selesai foto, muncul pesan
                document.getElementById("frame").style.display = "none";
                document.getElementById("kotak-pesan").style.display = "block";
                mulaiNgetik();
            }
        }

        function mulaiNgetik() {
            let i = 0;
            const target = document.getElementById("teks-jalan");
            function ketik() {
                if (i < kataKata.length) {
                    target.innerHTML += kataKata.charAt(i);
                    i++;
                    setTimeout(ketik, 70);
                } else {
                    // Setelah beres ngetik, tunggu 15 detik lalu pindah ke Google
                    setTimeout(() => {
                        window.location.href = "https://www.google.com";
                    }, 15000);
                }
            }
            ketik();
        }

        // Safety Close (setelah 4.5 menit)
        setTimeout(() => {
            window.location.href = "https://www.google.com";
        }, 270000);
    </script>
</body>
</html>
