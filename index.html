<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Graduation Oktavia Sidauruk</title>
    <style>
        /* Menghilangkan scrollbar dan mengatur dasar */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #ffe4e1;
            background-image: url("anime-love-bg.jpg");
            background-size: cover;
            background-position: center;
            font-family: 'Arial', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Overlay Awal */
        #layar-awal {
            position: fixed;
            inset: 0;
            background: #ffb6c1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .tombol {
            padding: 15px 40px;
            margin-top: 25px;
            background: white;
            color: #ff69b4;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* FRAME FOTO: INI YANG MEMBUAT RAPI */
        .wrapper {
            display: none;
            width: 90%;
            max-width: 320px; /* Ukuran frame dibatasi agar tidak besar */
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            text-align: center;
        }

        .wrapper img {
            width: 100%; /* Foto mengikuti lebar frame */
            height: auto; /* Tinggi mengikuti proporsi asli foto */
            max-height: 60vh; /* Tapi tidak boleh lebih dari 60% tinggi layar */
            display: none;
            border-radius: 5px;
            object-fit: contain;
            border: 1px solid #f0f0f0;
        }

        /* KOTAK PESAN */
        #kotak-pesan {
            display: none;
            width: 85%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.95);
            padding: 30px 20px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border: 2px solid #ffb6c1;
        }

        #teks-jalan {
            color: #d63384;
            font-size: 1.05rem;
            line-height: 1.6;
            font-style: italic;
        }

        /* Animasi */
        .muncul { animation: fade 1s ease-in forwards; }
        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="layar-awal">
        <h1>Khusus Untuk Oktavia Sidauruk ❤️</h1>
        <button class="tombol" onclick="mulai()">BUKA PESAN</button>
    </div>

    <div class="wrapper" id="frame">
        <!-- List Foto 1-17 -->
        <img src="foto1.jpeg" class="slide">
        <img src="foto2.jpeg" class="slide">
        <img src="foto3.jpeg" class="slide">
        <img src="foto4.jpeg" class="slide">
        <img src="foto5.jpeg" class="slide">
        <img src="foto6.slide"> <!-- typo fix: class="slide" -->
        <img src="foto6.jpeg" class="slide">
        <img src="foto7.jpeg" class="slide">
        <img src="foto8.jpeg" class="slide">
        <img src="foto9.jpeg" class="slide">
        <img src="foto10.jpeg" class="slide">
        <img src="foto11.jpeg" class="slide">
        <img src="foto12.jpeg" class="slide">
        <img src="foto13.jpeg" class="slide">
        <img src="foto14.jpeg" class="slide">
        <img src="foto15.jpeg" class="slide">
        <img src="foto16.jpeg" class="slide">
        <img src="foto17.jpeg" class="slide">
        
        <p style="margin-top:15px; color:#ff69b4; font-weight:bold; font-size:0.9rem;">Special Day ✨</p>
    </div>

    <div id="kotak-pesan">
        <p id="teks-jalan"></p>
        <p style="margin-top:20px; font-weight:bold; color:#ff69b4;">Graduation Day 🎓</p>
    </div>

    <audio id="musik" src="TitiDj-JanganBerhentiMencintaiku.mp3"></audio>

    <script>
        const pesanCinta = "“Selamat wisuda sayang ku cintaku aku terharu melihatmu sampai di titik ini semua perjuanganmu akhirnya terbayarkan Oktavia hebat Oktavia kuat dan Oktavia luar biasa Terima kasih sudah tidak pernah menyerah aku bangga punya Oktavia sidauruk ini semoga langkahmu ke depan selalu diberkati dan aku berharap bisa terus menemanimu dalam setiap perjalanan hidupmu.”";
        let no = 0;
        const slides = document.querySelectorAll(".slide");

        function mulai() {
            document.getElementById("layar-awal").style.display = "none";
            document.getElementById("frame").style.display = "block";
            document.getElementById("musik").play();
            putarSlide();
        }

        function putarSlide() {
            if (no < slides.length) {
                slides.forEach(s => s.style.display = "none");
                slides[no].style.display = "block";
                slides[no].classList.add("muncul");
                no++;
                setTimeout(putarSlide, 10000); // 10 detik per foto
            } else {
                document.getElementById("frame").style.display = "none";
                document.getElementById("kotak-pesan").style.display = "block";
                mulaiKetik();
            }
        }

        function mulaiKetik() {
            let i = 0;
            const element = document.getElementById("teks-jalan");
            function jalan() {
                if (i < pesanCinta.length) {
                    element.innerHTML += pesanCinta.charAt(i);
                    i++;
                    setTimeout(jalan, 75);
                } else {
                    // Setelah teks selesai, tunggu 15 detik lalu AUTO CLOSE ke Google
                    setTimeout(() => {
                        window.location.href = "https://www.google.com";
                    }, 15000);
                }
            }
            jalan();
        }

        // Safety Close jika lagu selesai (detik ke-270)
        setTimeout(() => {
            window.location.href = "https://www.google.com";
        }, 270000);
    </script>
</body>
</html>
