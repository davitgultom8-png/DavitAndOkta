<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Graduation Oktavia Sidauruk</title>
    <style>
        /* Dasar & Background */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-image: url("anime-love-bg.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-color: #fce4ec;
        }

        /* Overlay Awal Transparan (Background Anime tetap kelihatan) */
        #layar-awal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4); 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: white;
            text-align: center;
            backdrop-filter: blur(3px);
        }

        .tombol {
            padding: 15px 45px;
            margin-top: 25px;
            background: #ff69b4;
            color: white;
            border: 2px solid white;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            font-size: 1.1rem;
            transition: 0.3s;
        }

        /* Frame Foto Polaroid Sempurna */
        .wrapper {
            display: none;
            width: 85%; 
            max-width: 320px;
            background: white; 
            padding: 12px 12px 55px 12px;
            border-radius: 5px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.5);
            text-align: center;
            position: relative;
        }

        .wrapper img {
            width: 100%;
            height: 380px; 
            object-fit: cover;
            display: none;
            border-radius: 2px;
        }

        /* Teks Di Bawah Foto */
        .caption-foto {
            position: absolute;
            bottom: 15px;
            width: 100%;
            left: 0;
            color: #d81b60;
            font-size: 1rem;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
        }

        /* Kotak Pesan Transparan Estetik */
        #kotak-pesan {
            display: none;
            width: 88%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.92); 
            padding: 30px 25px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            border: 2px solid #f8bbd0;
        }

        #teks-jalan {
            color: #ad1457;
            font-size: 1.1rem;
            line-height: 1.6;
            font-style: italic;
        }

        .fade-in { animation: fadeInEffect 1.2s ease forwards; }
        @keyframes fadeInEffect { from {opacity: 0; transform: scale(0.9);} to {opacity: 1; transform: scale(1);} }
    </style>
</head>
<body>

    <div id="layar-awal">
        <h2 style="padding:0 20px; text-shadow: 2px 2px 8px rgba(0,0,0,0.6);">A Special Gift for<br>Oktavia Sidauruk ❤️</h2>
        <button class="tombol" onclick="mulai()">BUKA SEKARANG</button>
    </div>

    <div class="wrapper" id="frame">
        <!-- Foto 1-17 -->
        <img src="foto1.jpeg" class="slide">
        <img src="foto2.jpeg" class="slide">
        <img src="foto3.jpeg" class="slide">
        <img src="foto4.jpeg" class="slide">
        <img src="foto5.jpeg" class="slide">
        <img src="foto6.jpeg" class="slide">
        <img src="foto7.jpeg" class="slide">
        <img src="foto8.jpeg" class="slide">
        <img src="foto9.jpeg" class="slide">
        <img src="foto10.jpeg" class="slide">
        <img src="foto11.jpeg" class="slide">
        <img src="foto12.jpeg" class="slide">
        <img src="foto13.jpeg" class="slide">
        <img src="foto14.jpeg" class="slide">
        <img src="foto15.jpeg" class="slide">
        <img src="foto16.jpeg" class="slide">
        <img src="foto17.jpeg" class="slide">
        
        <p class="caption-foto">Happy Graduation Sayang ❤️</p>
    </div>

    <div id="kotak-pesan">
        <p id="teks-jalan"></p>
        <p style="margin-top:25px; font-weight:bold; color:#d81b60; font-size: 1.3rem; letter-spacing: 1px;">Love You 💖</p>
    </div>

    <!-- Pastikan nama file lagu benar -->
    <audio id="musik" src="TitiDj-JanganBerhentiMencintaiku.mp3"></audio>

    <script>
        const pesanCinta = "“Selamat wisuda sayang ku cintaku aku terharu melihatmu sampai di titik ini semua perjuanganmu akhirnya terbayarkan Oktavia hebat Oktavia kuat dan Oktavia luar biasa Terima kasih sudah tidak pernah menyerah aku bangga punya Oktavia sidauruk ini semoga langkahmu ke depan selalu diberkati dan aku berharap bisa terus menemanimu dalam setiap perjalanan hidupmu.”";
        let n = 0;
        const slides = document.querySelectorAll(".slide");

        function mulai() {
            document.getElementById("layar-awal").style.display = "none";
            document.getElementById("frame").style.display = "block";
            document.getElementById("musik").play();
            tampilSlide();
        }

        function tampilSlide() {
            if (n < slides.length) {
                slides.forEach(s => s.style.display = "none");
                slides[n].style.display = "block";
                slides[n].classList.add("fade-in");
                n++;
                setTimeout(tampilSlide, 9000); // 9 detik per foto (Total 17 foto pas dengan durasi lagu)
            } else {
                document.getElementById("frame").style.display = "none";
                document.getElementById("kotak-pesan").style.display = "block";
                document.getElementById("kotak-pesan").classList.add("fade-in");
                ketikTeks();
            }
        }

        function ketikTeks() {
            let i = 0;
            const target = document.getElementById("teks-jalan");
            function prosesKetik() {
                if (i < pesanCinta.length) {
                    target.innerHTML += pesanCinta.charAt(i);
                    i++;
                    setTimeout(prosesKetik, 75);
                } else {
                    // Tunggu 15 detik setelah teks selesai diketik, lalu auto-close ke Google
                    setTimeout(() => {
                        window.location.href = "https://www.google.com";
                    }, 15000);
                }
            }
            prosesKetik();
        }
    </script>
</body>
</html>
