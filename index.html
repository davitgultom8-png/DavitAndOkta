<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Graduation Oktavia Sidauruk</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #ffe4e1;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* LAYAR AWAL */
        #layar-awal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #ffb6c1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: white;
            text-align: center;
        }

        .tombol {
            padding: 15px 30px;
            margin-top: 20px;
            background: white;
            color: #ff69b4;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* FRAME FOTO (UKURAN RAPI & TETAP) */
        .container {
            display: none;
            position: relative;
            width: 300px; /* Ukuran lebar dikunci agar tidak besar */
            height: 400px;
            background: white;
            padding: 15px 15px 60px 15px; /* Memberi jarak bawah seperti Polaroid */
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border-radius: 4px;
        }

        .container img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* FOTO DIJAMIN TIDAK TERPOTONG / PECAH */
            display: none;
            border: 1px solid #eee;
        }

        /* KOTAK PESAN */
        #kotak-pesan {
            display: none;
            width: 90%;
            max-width: 400px;
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        #teks-jalan {
            color: #d63384;
            font-size: 1.1rem;
            line-height: 1.6;
            font-style: italic;
        }

        /* ANIMASI */
        .fade-in { animation: fadeIn 1s ease-in forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    </style>
</head>
<body>

    <div id="layar-awal">
        <h1>Untuk Oktavia Sidauruk ❤️</h1>
        <button class="tombol" onclick="mulaiKejutan()">Buka Sekarang</button>
    </div>

    <div class="container" id="frame-foto">
        <img src="foto1.jpeg" class="slides">
        <img src="foto2.jpeg" class="slides">
        <img src="foto3.jpeg" class="slides">
        <img src="foto4.jpeg" class="slides">
        <img src="foto5.jpeg" class="slides">
        <img src="foto6.jpeg" class="slides">
        <img src="foto7.jpeg" class="slides">
        <img src="foto8.jpeg" class="slides">
        <img src="foto9.jpeg" class="slides">
        <img src="foto10.jpeg" class="slides">
        <img src="foto11.jpeg" class="slides">
        <img src="foto12.jpeg" class="slides">
        <img src="foto13.jpeg" class="slides">
        <img src="foto14.jpeg" class="slides">
        <img src="foto15.jpeg" class="slides">
        <img src="foto16.jpeg" class="slides">
        <img src="foto17.jpeg" class="slides">
    </div>

    <div id="kotak-pesan">
        <p id="teks-jalan"></p>
        <p style="margin-top:20px; font-weight:bold; color:#ff69b4;">❤️ Happy Graduation ❤️</p>
    </div>

    <audio id="musik" src="TitiDj-JanganBerhentiMencintaiku.mp3"></audio>

    <script>
        const pesan = "“Selamat wisuda sayang ku cintaku aku terharu melihatmu sampai di titik ini semua perjuanganmu akhirnya terbayarkan Oktavia hebat Oktavia kuat dan Oktavia luar biasa Terima kasih sudah tidak pernah menyerah aku bangga punya Oktavia sidauruk ini semoga langkahmu ke depan selalu diberkati dan aku berharap bisa terus menemanimu dalam setiap perjalanan hidupmu.”";
        let indexFoto = 0;
        const slides = document.getElementsByClassName("slides");

        function mulaiKejutan() {
            document.getElementById("layar-awal").style.display = "none";
            document.getElementById("frame-foto").style.display = "block";
            document.getElementById("musik").play();
            tampilkanSlides();
        }

        function tampilkanSlides() {
            if (indexFoto < slides.length) {
                // Sembunyikan foto sebelumnya
                for (let i = 0; i < slides.length; i++) {
                    slides[i].style.display = "none";
                }
                // Tampilkan foto sekarang
                slides[indexFoto].style.display = "block";
                slides[indexFoto].classList.add("fade-in");
                indexFoto++;
                
                // Ganti foto setiap 12 detik agar pas dengan lagu (total 17 foto)
                setTimeout(tampilkanSlides, 12000);
            } else {
                // Selesai semua foto, tampilkan pesan teks
                document.getElementById("frame-foto").style.display = "none";
                document.getElementById("kotak-pesan").style.display = "block";
                ketikPesan();
            }
        }

        function ketikPesan() {
            let i = 0;
            const target = document.getElementById("teks-jalan");
            function ketik() {
                if (i < pesan.length) {
                    target.innerHTML += pesan.charAt(i);
                    i++;
                    setTimeout(ketik, 80);
                } else {
                    // Setelah teks selesai, tunggu 15 detik lalu auto-close
                    setTimeout(tutupWeb, 15000);
                }
            }
            ketik();
        }

        function tutupWeb() {
            // Karena browser modern memblokir window.close(), kita arahkan ke Google
            window.location.href = "https://www.google.com";
        }

        // Safety Timer: Jika lagu habis (270 detik), web otomatis close
        setTimeout(tutupWeb, 270000);

    </script>
</body>
</html>
