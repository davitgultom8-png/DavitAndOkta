<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Graduation Oktavia Sidauruk</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* OVERLAY AWAL */
    #overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background-color: #ffb6c1;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      flex-direction: column;
      text-align: center;
      color: white;
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    .btn-buka {
      padding: 15px 35px;
      margin-top: 20px;
      background: white;
      color: #ff69b4;
      border-radius: 50px;
      font-weight: bold;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    /* BACKGROUND UTAMA */
    body {
      background-image: url("anime-love-bg.jpg"); 
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      font-family: 'Georgia', serif;
      height: 100vh;
      width: 100vw;
      overflow: hidden; 
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .bg-filter {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255, 255, 255, 0.4);
      z-index: -1;
    }

    .content {
      display: none;
      width: 100%;
      height: 100%;
      position: relative;
    }

    /* PERBAIKAN UKURAN FOTO AGAR TIDAK TERLALU BESAR */
    .gallery {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80%; /* Ukuran container lebih kecil agar cantik */
      max-width: 350px; /* Maksimal lebar di laptop/HP besar */
      height: 350px;
    }

    .gallery img {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain; /* FOTO TIDAK TERPOTONG (Proporsional) */
      background-color: rgba(255, 255, 255, 0.5); /* Background tipis jika foto tidak kotak */
      border: 6px solid white;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      opacity: 0;
      animation: slideShow 12s forwards; 
    }

    /* KOTAK PESAN */
    #container-pesan {
      display: none; 
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 85%;
      max-width: 500px;
      background: rgba(255, 255, 255, 0.95);
      padding: 30px 20px;
      border-radius: 20px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.1);
      text-align: center;
      color: #d63384;
      border-top: 5px solid #ff69b4;
    }

    .footer-text {
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 20px;
      font-style: italic;
    }

    /* ANIMASI SLIDESHOW */
    @keyframes slideShow {
      0% { opacity: 0; transform: scale(0.95); }
      10% { opacity: 1; transform: scale(1); }
      90% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.95); }
    }

    /* Delay Sinkron Lagu (Total 204 Detik) */
    img:nth-child(1) { animation-delay: 0s; }
    img:nth-child(2) { animation-delay: 12s; }
    img:nth-child(3) { animation-delay: 24s; }
    img:nth-child(4) { animation-delay: 36s; }
    img:nth-child(5) { animation-delay: 48s; }
    img:nth-child(6) { animation-delay: 60s; }
    img:nth-child(7) { animation-delay: 72s; }
    img:nth-child(8) { animation-delay: 84s; }
    img:nth-child(9) { animation-delay: 96s; }
    img:nth-child(10) { animation-delay: 108s; }
    img:nth-child(11) { animation-delay: 120s; }
    img:nth-child(12) { animation-delay: 132s; }
    img:nth-child(13) { animation-delay: 144s; }
    img:nth-child(14) { animation-delay: 156s; }
    img:nth-child(15) { animation-delay: 168s; }
    img:nth-child(16) { animation-delay: 180s; }
    img:nth-child(17) { animation-delay: 192s; }

  </style>
</head>
<body>

  <div id="overlay" onclick="mulai()">
    <h2>Klik Untuk Kejutan Spesial Oktavia ❤️</h2>
    <button class="btn-buka">BUKA SEKARANG</button>
  </div>

  <div class="bg-filter"></div>

  <div class="content" id="mainContent">
    <div class="gallery" id="galeriFoto">
      <img src="foto1.jpeg" alt="1">
      <img src="foto2.jpeg" alt="2">
      <img src="foto3.jpeg" alt="3">
      <img src="foto4.jpeg" alt="4">
      <img src="foto5.jpeg" alt="5">
      <img src="foto6.jpeg" alt="6">
      <img src="foto7.jpeg" alt="7">
      <img src="foto8.jpeg" alt="8">
      <img src="foto9.jpeg" alt="9">
      <img src="foto10.jpeg" alt="10">
      <img src="foto11.jpeg" alt="11">
      <img src="foto12.jpeg" alt="12">
      <img src="foto13.jpeg" alt="13">
      <img src="foto14.jpeg" alt="14">
      <img src="foto15.jpeg" alt="15">
      <img src="foto16.jpeg" alt="16">
      <img src="foto17.jpeg" alt="17">
    </div>

    <div id="container-pesan">
      <p class="footer-text" id="typed-text"></p>
      <p style="font-weight:bold; font-size: 1.1rem;">💖 Jangan berhenti mencintaiku 💖</p>
    </div>
  </div>

  <audio id="myLagu">
    <source src="TitiDj-JanganBerhentiMencintaiku.mp3" type="audio/mpeg">
  </audio>

  <script>
    const pesanOktavia = "“Selamat wisuda sayang ku cintaku aku terharu melihatmu sampai di titik ini semua perjuanganmu akhirnya terbayarkan Oktavia hebat Oktavia kuat dan Oktavia luar biasa Terima kasih sudah tidak pernah menyerah aku bangga punya Oktavia sidauruk ini semoga langkahmu ke depan selalu diberkati dan aku berharap bisa terus menemanimu dalam setiap perjalanan hidupmu.”";

    function typeWriter(text, i, fnCallback) {
      if (i < text.length) {
        document.getElementById("typed-text").innerHTML = text.substring(0, i+1);
        setTimeout(function() {
          typeWriter(text, i + 1, fnCallback)
        }, 90); 
      } else {
        setTimeout(fnCallback, 15000); // Pesan tampil 15 detik sebelum close
      }
    }

    function mulai() {
      document.getElementById("overlay").style.display = "none";
      document.getElementById("mainContent").style.display = "block";
      const lagu = document.getElementById("myLagu");
      lagu.play();

      // Foto selesai di detik 204
      setTimeout(function() {
        document.getElementById("galeriFoto").style.display = "none";
        document.getElementById("container-pesan").style.display = "block";
        
        typeWriter(pesanOktavia, 0, function() {
          // Auto Close (Pindah ke Google)
          window.location.href = "https://www.google.com";
        });
      }, 204000); 

      // Safety Close tepat saat lagu berakhir (detik 270)
      setTimeout(function() {
         window.location.href = "https://www.google.com";
      }, 270000);
    }
  </script>
</body>
</html>
