<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Happy Graduation Sayang</title>
  <style>
    /* Reset dasar */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      height: 100%;
      width: 100%;
      font-family: 'Arial', sans-serif;
      overflow: hidden;
    }

    /* Layar Awal (Splash Screen) */
    #welcome-screen {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: #ffb6c1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      color: white;
      text-align: center;
    }

    #welcome-screen button {
      margin-top: 20px;
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 50px;
      background: white;
      color: #ff69b4;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      transition: 0.3s;
    }

    #welcome-screen button:hover {
      transform: scale(1.1);
    }

    /* Container utama untuk background */
    .main-container {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      /* Background Image */
      background-image: url("anime-love-bg.jpg"); 
      background-position: center;
      background-repeat: no-repeat;
      background-size: cover;
      display: none; /* Sembunyi dulu sebelum diklik */
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Overlay agar teks terbaca */
    .overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255, 255, 255, 0.4);
      z-index: 1;
    }

    .content {
      position: relative;
      z-index: 10;
      text-align: center;
      width: 100%;
    }

    h1 {
      color: #d63384;
      text-shadow: 2px 2px 5px rgba(255, 255, 255, 0.8);
      margin-bottom: 20px;
      opacity: 0;
    }

    .gallery {
      position: relative;
      height: 450px;
      width: 100%;
    }

    img {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      max-width: 90%;
      max-height: 400px;
      border: 10px solid white;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      opacity: 0;
    }

    /* Animasi Aktif Setelah Klik */
    .animate-now h1 {
      animation: fadeText 3s forwards;
    }

    .animate-now img {
      animation: showHide 8s forwards;
    }

    @keyframes fadeText {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes showHide {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.7); }
      15% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      85% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(0.7); }
    }

    /* Delay Foto */
    img:nth-child(1) { animation-delay: 2s; }
    img:nth-child(2) { animation-delay: 10s; }
    img:nth-child(3) { animation-delay: 18s; }
    img:nth-child(4) { animation-delay: 26s; }
    img:nth-child(5) { animation-delay: 34s; }
    img:nth-child(6) { animation-delay: 42s; }
    img:nth-child(7) { animation-delay: 50s; }
    img:nth-child(8) { animation-delay: 58s; }
    img:nth-child(9) { animation-delay: 66s; }
    img:nth-child(10) { animation-delay: 74s; }
    img:nth-child(11) { animation-delay: 82s; }
    img:nth-child(12) { animation-delay: 90s; }
    img:nth-child(13) { animation-delay: 98s; }
    img:nth-child(14) { animation-delay: 106s; }
    img:nth-child(15) { animation-delay: 114s; }
    img:nth-child(16) { animation-delay: 122s; }
    img:nth-child(17) { animation-delay: 130s; }
  </style>
</head>
<body>

  <!-- Layar Sambutan -->
  <div id="welcome-screen">
    <h1>Hai Sayang ❤️</h1>
    <p>Ada pesan spesial buat kamu...</p>
    <button onclick="bukaPesan()">Klik untuk Buka</button>
  </div>

  <!-- Konten Utama -->
  <div class="main-container" id="main-container">
    <div class="overlay"></div>
    <div class="content" id="content-box">
      <h1>💖 Happy Graduation Sayang 💖</h1>
      <div class="gallery">
        <img src="foto1.jpeg" alt="1">
        <img src="foto2.jpeg" alt="2">
        <img src="foto3.jpeg" alt="3">
        <img src="foto4.jpeg" alt="4">
        <img src="foto5.jpeg" alt="5">
        <img src="foto6.jpeg" alt="6">
        <img src="foto7.jpeg" alt="7">
        <img src="foto8.jpeg" alt="8">
        <img src="foto9.jpeg" alt="9">
        <img src="foto10.jpeg" alt="10">
        <img src="foto11.jpeg" alt="11">
        <img src="foto12.jpeg" alt="12">
        <img src="foto13.jpeg" alt="13">
        <img src="foto14.jpeg" alt="14">
        <img src="foto15.jpeg" alt="15">
        <img src="foto16.jpeg" alt="16">
        <img src="foto17.jpeg" alt="17">
      </div>
    </div>
  </div>

  <audio id="lagu" loop>
    <source src="TitiDj-JanganBerhentiMencintaiku.mp3" type="audio/mpeg">
  </audio>

  <script>
    function bukaPesan() {
      // Sembunyikan layar welcome
      document.getElementById("welcome-screen").style.display = "none";
      
      // Munculkan kontainer utama
      var main = document.getElementById("main-container");
      main.style.display = "flex";
      
      // Tambahkan class untuk memulai animasi teks & foto
      document.getElementById("content-box").classList.add("animate-now");

      // Putar musik secara otomatis setelah interaksi klik
      var audio = document.getElementById("lagu");
      audio.play();
    }
  </script>

</body>
</html>
