<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Graduation Sayang</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* LAYAR PEMBUKA */
    #overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background-color: #ffb6c1;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      cursor: pointer;
      flex-direction: column;
      text-align: center;
      color: white;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    #overlay h1 {
      font-size: 1.5rem;
      margin-bottom: 20px;
      text-shadow: 2px 2px 5px rgba(0,0,0,0.3);
    }
    .btn-buka {
      padding: 15px 30px;
      margin-top: 20px;
      background: white;
      color: #ff69b4;
      border-radius: 50px;
      font-weight: bold;
      border: none;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      cursor: pointer;
      transition: 0.3s;
    }
    .btn-buka:hover { background: #ffe4f1; }

    /* BACKGROUND UTAMA */
    body {
      background-image: url("anime-love-bg.jpg"); 
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      font-family: 'Georgia', serif;
      text-align: center;
      overflow-x: hidden;
      min-height: 100vh;
      color: #d63384;
    }
    .bg-filter {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255, 255, 255, 0.5);
      z-index: -1;
    }
    .content {
      display: none;
      padding: 40px 15px;
    }
    h1 {
      font-size: 2rem;
      text-shadow: 2px 2px 5px white;
      margin-bottom: 20px;
    }

    /* GALLERY SLIDESHOW */
    .gallery {
      position: relative;
      margin: 20px auto;
      height: 400px;
      width: 100%;
      max-width: 500px;
    }
    .gallery img {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      max-width: 90%;
      max-height: 350px;
      border: 10px solid white;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      opacity: 0;
      animation: slideShow 7s forwards;
    }

    /* PESAN UTAMA */
    .pesan-tengah {
      opacity: 0;
      margin: 40px auto;
      padding: 25px;
      background: rgba(255, 255, 255, 0.85);
      border-radius: 25px;
      max-width: 600px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      animation: fadeIn 3s forwards;
      animation-delay: 120s;
      line-height: 1.8;
      font-size: 1.1rem;
      border-left: 5px solid #ff69b4;
    }
    .signature {
      margin-top: 25px;
      font-weight: bold;
      font-size: 1.2rem;
    }

    /* ANIMASI */
    @keyframes fadeIn { 
      from { opacity: 0; transform: translateY(20px); } 
      to { opacity: 1; transform: translateY(0); } 
    }
  </style>
</head>
<body>
  <!-- LAYAR PEMBUKA -->
  <div id="overlay" onclick="mulai()">
    <h1>Klik untuk pesan spesial dari seseorang yang selalu bangga padamu ❤️</h1>
    <button class="btn-buka">Buka</button>
  </div>

  <div class="bg-filter"></div>

  <!-- KONTEN UTAMA -->
  <div class="content">
    <h1>Selamat Wisuda Sayang</h1>
    <div class="gallery">
      <!-- Foto-foto dimasukkan di sini -->
    </div>
    <div class="pesan-tengah">
      Jangan berhenti mencintaiku dan jangan berubah sampai kapanpun
      <div class="signature">❤️ Dari seseorang yang bangga padamu ❤️</div>
    </div>
  </div>

  <!-- MUSIK -->
  <audio id="musik" src="musik/musik/TitiDj-JanganBerhentiMencintaiku.mp3" autoplay hidden></audio>

  <script>
    function mulai() {
      document.getElementById("overlay").style.display = "none";
      document.querySelector(".content").style.display = "block";

      const musik = document.getElementById("musik");
      musik.onloadedmetadata = () => {
        const durasi = musik.duration * 1000;
        setTimeout(() => { window.close(); }, durasi);
      };
    }
  </script>
</body>
</html>
