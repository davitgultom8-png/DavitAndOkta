<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Graduation Sayang</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* LAYAR PEMBUKA */
    #overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background-color: #ffb6c1;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      cursor: pointer;
      flex-direction: column;
      text-align: center;
      color: white;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    #overlay h1 {
      font-size: 1.5rem;
      margin-bottom: 20px;
      text-shadow: 2px 2px 5px rgba(0,0,0,0.3);
    }
    .btn-buka {
      padding: 15px 30px;
      margin-top: 20px;
      background: white;
      color: #ff69b4;
      border-radius: 50px;
      font-weight: bold;
      border: none;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      cursor: pointer;
      transition: 0.3s;
    }
    .btn-buka:hover { background: #ffe4f1; }

    /* BACKGROUND UTAMA */
    body {
      background-image: url("anime-love-bg.jpg"); 
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      font-family: 'Georgia', serif;
      text-align: center;
      overflow-x: hidden;
      min-height: 100vh;
      color: #d63384;
    }
    .bg-filter {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255, 255, 255, 0.5);
      z-index: -1;
    }
    .content {
      display: none;
      padding: 40px 15px;
    }
    h1 {
      font-size: 2rem;
      text-shadow: 2px 2px 5px white;
      margin-bottom: 20px;
    }
