<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Graduation Sayang</title>
    <style>
        :root {
            --pink-primary: #ff69b4;
            --pink-light: #ffb6c1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--pink-light), #f8bbd0, #fce4ec);
            color: #d81b60;
            overflow-x: hidden;
        }

        h1 {
            margin-top: 20px;
            font-size: 2rem;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.1);
            z-index: 10;
        }

        /* Container Galeri */
        .gallery-container {
            position: relative;
            width: 320px;
            height: 450px;
            margin: 30px 0;
            perspective: 1000px;
        }

        .photo {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border: 8px solid white;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        .photo.active {
            opacity: 1;
        }

        .message {
            padding: 20px;
            font-style: italic;
            font-weight: bold;
            max-width: 80%;
            line-height: 1.5;
        }

        /* Overlay Awal untuk Aktifkan Musik */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 182, 193, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
            cursor: pointer;
        }

        .play-btn {
            background: white;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            color: var(--pink-primary);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="play-btn">❤️ Buka Pesan Untukmu ❤️</div>
        <p style="margin-top: 15px; color: #fff;">Klik di mana saja</p>
    </div>

    <h1>💖 Happy Graduation 💖</h1>

    <div class="gallery-container">
        <!-- Tambahkan foto Anda di sini. Sesuaikan nama file! -->
        <img src="images/foto1.jpeg" class="photo active">
        <img src="images/foto2.jpeg" class="photo">
        <img src="images/foto3.jpeg" class="photo">
        <img src="images/foto4.jpeg" class="photo">
        <img src="images/foto5.jpeg" class="photo">
        <!-- Anda bisa menambah sampai 17 foto -->
    </div>

    <div class="message">
        "Jangan berhenti mencintaiku dan jangan berubah sampai kapanpun..."
    </div>

    <audio id="mySong" loop>
        <source src="musik/lagu.mp3" type="audio/mpeg">
    </audio>

    <script>
        const overlay = document.getElementById('overlay');
        const audio = document.getElementById('mySong');
        const photos = document.querySelectorAll('.photo');
        let currentPhoto = 0;

        // Fungsi untuk memulai segalanya setelah klik
        overlay.addEventListener('click', function() {
            overlay.style.display = 'none';
            audio.play().catch(error => console.log("Musik gagal putar:", error));
            
            // Mulai slide foto
            setInterval(nextPhoto, 3000); // Ganti foto setiap 3 detik
        });

        function nextPhoto() {
            photos[currentPhoto].classList.remove('active');
            currentPhoto = (currentPhoto + 1) % photos.length;
            photos[currentPhoto].classList.add('active');
        }
    </script>
</body>
</html>
